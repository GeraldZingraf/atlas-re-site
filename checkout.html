<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout &middot; Atlas for Real Estate</title>
<link rel="icon" href="/favicon.png">
<style>
  :root{
    --bg:#0c0c14; --panel:#15151f; --ink:#f3f3f8; --muted:#a7a7b8;
    --line:#2a2a38; --brand:#7c5cff; --accent-grad:linear-gradient(135deg,#7c5cff,#4ac0ff);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:30px 28px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h1{font-size:24px;margin:8px 0 2px}
  .price{font-size:34px;font-weight:700;margin:14px 0 2px}
  .price small{display:block;font-size:13px;font-weight:400;color:var(--muted);margin-top:4px}
  .divider{height:1px;background:var(--line);margin:22px 0}
  .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:0 0 10px}
  #paypal-buttons{min-height:46px}
  .or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:20px 0}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}
  .field{background:#fff;border:0;border-radius:10px;padding:0;margin-bottom:10px;
    height:48px;overflow:hidden;display:flex;align-items:center}
  .field iframe{width:100%;height:46px;border:0}
  .row{display:flex;gap:10px}
  .row .field{flex:1}
  #card-submit{width:100%;border:0;border-radius:10px;padding:14px;font-size:15px;font-weight:600;
    color:#fff;background:var(--accent-grad);cursor:pointer;margin-top:16px}
  #card-submit:disabled{opacity:.5;cursor:default}
  .note{font-size:12px;color:var(--muted);margin-top:18px;line-height:1.5}
  .msg{font-size:14px;margin-top:14px;padding:11px 13px;border-radius:10px;display:none}
  .msg.err{display:block;background:rgba(255,90,90,.12);color:#ff9b9b;border:1px solid rgba(255,90,90,.3)}
  .msg.busy{display:block;background:rgba(124,92,255,.12);color:#c9bcff;border:1px solid rgba(124,92,255,.3)}
  a.back{color:var(--muted);font-size:13px;text-decoration:none}
  a.back:hover{color:var(--ink)}
  /* Small phones: trim outer + card padding so the card fields get more width */
  @media (max-width:480px){
    body{padding:14px}
    .card{padding:26px 18px;border-radius:16px}
    .row{gap:8px}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Atlas for Real Estate</div>
    <h1 id="kit-name">Loading…</h1>
    <div class="price" id="kit-price"></div>
    <div class="divider"></div>

    <p class="label">Pay with PayPal</p>
    <div id="paypal-buttons"></div>

    <div class="or" id="card-or" style="display:none">or pay by card</div>

    <div id="card-wrap" style="display:none">
      <div class="field" id="card-number"></div>
      <div class="row">
        <div class="field" id="card-expiry"></div>
        <div class="field" id="card-cvv"></div>
      </div>
      <button id="card-submit">Pay by card</button>
    </div>

    <div class="msg" id="msg"></div>

    <p class="note">Secure checkout on agent-atlas.co. Card details are entered in
      fields hosted by PayPal and never touch our servers. One-time payment.</p>
    <div class="divider"></div>
    <a class="back" href="/">&larr; Back to Atlas</a>
  </div>

<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const sku = params.get('sku');
  const msg = document.getElementById('msg');
  const show = (text, kind) => { msg.textContent = text; msg.className = 'msg ' + kind; };

  // 1) Pull public config (client-id + price) from our function.
  let cfg;
  try {
    const r = await fetch('/.netlify/functions/pp-config?sku=' + encodeURIComponent(sku || ''));
    cfg = await r.json();
  } catch (e) { show('Could not load checkout. Refresh to try again.', 'err'); return; }

  if (!cfg.item) { show('Unknown product. Please return to the Atlas page and pick a kit.', 'err'); return; }
  if (!cfg.clientId) { show('Checkout is not configured yet. (Missing PayPal client id.)', 'err'); return; }

  document.getElementById('kit-name').textContent = cfg.item.label;
  document.getElementById('kit-price').innerHTML = cfg.item.display + '<small>once. that is the whole product.</small>';
  document.title = cfg.item.label + ' · Atlas for Real Estate';

  // 2) Load the PayPal SDK with the public client-id (buttons + card fields).
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://www.paypal.com/sdk/js?client-id=' + encodeURIComponent(cfg.clientId)
          + '&currency=USD&components=buttons,card-fields&intent=capture';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  }).catch(() => show('Could not reach PayPal. Refresh to try again.', 'err'));

  if (!window.paypal) return;

  // Shared order lifecycle — used by both the PayPal button and the card fields.
  async function createOrder() {
    const r = await fetch('/.netlify/functions/create-order', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sku }),
    });
    const d = await r.json();
    if (!d.id) throw new Error('create failed');
    return d.id;
  }

  async function onApprove(data) {
    show('Completing your payment…', 'busy');
    const r = await fetch('/.netlify/functions/capture-order', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderID: data.orderID }),
    });
    const d = await r.json();
    if (d.ok) {
      location.href = '/thank-you.html?txn=' + encodeURIComponent(d.txnId);
    } else {
      show('Your payment could not be completed. You have not been charged. Please try again.', 'err');
    }
  }

  function onError() {
    show('Something went wrong with the payment. Please try again.', 'err');
  }

  // 3) PayPal button (handles PayPal-balance payers; opens PayPal in a popup).
  window.paypal.Buttons({ createOrder, onApprove, onError })
    .render('#paypal-buttons');

  // 4) Embedded card fields — card payers stay on this page, no PayPal account.
  //    Only renders if your PayPal account is approved for Advanced Card Payments.
  const cardFields = window.paypal.CardFields({
    createOrder, onApprove, onError,
    style: {
      input: { 'font-size': '16px', 'font-family': 'sans-serif', color: '#15151f', padding: '0 14px', border: 'none', outline: 'none' },
      '::placeholder': { color: '#9aa0aa' },
      '.invalid': { color: '#d4334b' },
    },
  });
  if (cardFields.isEligible()) {
    document.getElementById('card-or').style.display = 'flex';
    document.getElementById('card-wrap').style.display = 'block';
    cardFields.NumberField().render('#card-number');
    cardFields.ExpiryField().render('#card-expiry');
    cardFields.CVVField().render('#card-cvv');

    const btn = document.getElementById('card-submit');
    btn.addEventListener('click', () => {
      btn.disabled = true;
      show('Processing your card…', 'busy');
      cardFields.submit()
        .catch(() => { onError(); btn.disabled = false; });
    });
  }
})();
</script>
</body>
</html>
